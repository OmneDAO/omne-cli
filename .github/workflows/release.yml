name: Release OMNE CLI

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., v0.1.0)'
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create_release.outputs.result }}
      upload_url: ${{ steps.create_release.outputs.upload_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Create Release
        id: create_release
        uses: actions/github-script@v7
        with:
          script: |
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: '${{ github.ref_name }}',
              name: 'OMNE CLI ${{ github.ref_name }}',
              body: 'Release of OMNE CLI ${{ github.ref_name }}',
              draft: false,
              prerelease: false
            });
            return data.id;

  build-binaries:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux targets
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: omne-linux-x86_64.tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            name: omne-linux-aarch64.tar.gz
          
          # macOS targets
          - target: x86_64-apple-darwin
            os: macos-latest
            name: omne-macos-x86_64.tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            name: omne-macos-aarch64.tar.gz
          
          # Windows targets
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            name: omne-windows-x86_64.zip
          - target: aarch64-pc-windows-msvc
            os: windows-latest
            name: omne-windows-aarch64.zip

    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
          
      - name: Install cross-compilation tools
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          
      - name: Configure cross-compilation
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          echo '[target.aarch64-unknown-linux-gnu]' >> ~/.cargo/config.toml
          echo 'linker = "aarch64-linux-gnu-gcc"' >> ~/.cargo/config.toml
          
      - name: Build binary
        run: cargo build --release --target ${{ matrix.target }}
        
      - name: Package binary (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          mkdir -p package
          cp target/${{ matrix.target }}/release/omne package/
          cp README.md package/
          cd package
          tar -czf ../${{ matrix.name }} *
          
      - name: Package binary (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          mkdir package
          cp target/${{ matrix.target }}/release/omne.exe package/
          cp README.md package/
          cd package
          7z a ../${{ matrix.name }} *
          
      - name: Upload Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ./${{ matrix.name }}
          asset_name: ${{ matrix.name }}
          asset_content_type: application/octet-stream

  publish-crates:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: build-binaries
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        
      - name: Run tests
        run: cargo test --all-features
        
      - name: Publish to crates.io
        run: cargo publish --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

  build-docker:
    name: Build and push Docker images
    runs-on: ubuntu-latest
    needs: create-release
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  update-package-managers:
    name: Update Package Managers
    runs-on: ubuntu-latest
    needs: [create-release, build-binaries]
    steps:
      - uses: actions/checkout@v4
      
      - name: Update Homebrew Formula
        uses: dawidd6/action-homebrew-bump-formula@v3
        with:
          token: ${{ secrets.HOMEBREW_GITHUB_TOKEN }}
          formula: omne-cli
          
      - name: Create Chocolatey Package
        run: |
          # This will be handled by a separate workflow due to Windows requirements
          echo "Chocolatey package update triggered"
          
      - name: Update Snap Package
        run: |
          # This will be handled by a separate workflow due to Snap store requirements  
          echo "Snap package update triggered"

  update-docs:
    name: Update Documentation Site
    runs-on: ubuntu-latest
    needs: create-release
    steps:
      - name: Trigger docs deployment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.DOCS_DEPLOY_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: 'OmneDAO',
              repo: 'omne-foundation',
              workflow_id: 'deploy-docs.yml',
              ref: 'main'
            });