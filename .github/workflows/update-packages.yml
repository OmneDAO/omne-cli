name: Update Package Managers

# Required secrets:
# - CHOCOLATEY_API_KEY: API key for Chocolatey package publishing
# - SNAPCRAFT_STORE_CREDENTIALS: Snapcraft store credentials for publishing
# - AUR_SSH_PRIVATE_KEY: SSH private key for AUR package publishing

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to update (e.g., v0.1.0)'
        required: true
        type: string

jobs:
  update-homebrew:
    name: Update Homebrew Formula
    runs-on: ubuntu-latest
    steps:
      - name: Update Homebrew Formula
        uses: dawidd6/action-homebrew-bump-formula@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          formula: omne-cli
          tag: ${{ github.event.release.tag_name || github.event.inputs.version }}
          revision: ${{ github.sha }}
          force: false

  update-chocolatey:
    name: Update Chocolatey Package
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup NuGet
        uses: nuget/setup-nuget@v1
        
      - name: Update Chocolatey Package
        shell: powershell
        run: |
          $version = "${{ github.event.release.tag_name || github.event.inputs.version }}".TrimStart('v')
          $downloadUrl = "https://github.com/${{ github.repository }}/releases/download/v$version/omne-windows-x86_64.zip"
          
          # Download the binary to calculate checksum
          Invoke-WebRequest -Uri $downloadUrl -OutFile "omne-windows-x86_64.zip"
          $checksum = (Get-FileHash -Algorithm SHA256 "omne-windows-x86_64.zip").Hash
          
          # Update nuspec version
          $nuspecPath = "chocolatey/omne-cli.nuspec"
          (Get-Content $nuspecPath) -replace '<version>.*</version>', "<version>$version</version>" | Set-Content $nuspecPath
          
          # Update install script with checksum
          $installScript = "chocolatey/tools/chocolateyinstall.ps1"
          (Get-Content $installScript) -replace 'PLACEHOLDER_CHECKSUM', $checksum | Set-Content $installScript
          (Get-Content $installScript) -replace '\$version', $version | Set-Content $installScript
          
          # Package and publish (requires API key)
          choco pack chocolatey/omne-cli.nuspec --outputdirectory chocolatey/
          # choco push chocolatey/omne-cli.$version.nupkg --api-key ${{ secrets.CHOCOLATEY_API_KEY }}

  update-snap:
    name: Update Snap Package (Disabled - Not Registered)
    runs-on: ubuntu-latest
    if: false  # Disabled until snap is registered in Snap Store
    steps:
      - uses: actions/checkout@v4
      
      - name: Snap Registration Required
        run: |
          echo "⚠️  Snap package not yet registered in Snap Store"
          echo "To enable snap publishing:"
          echo "1. Register 'omne-cli' at https://snapcraft.io/register-snap"  
          echo "2. Build initial snap: 'snapcraft'"
          echo "3. Upload manually: 'snapcraft upload omne-cli_*.snap --release=stable'"
          echo "4. Export credentials: 'snapcraft export-login ~/snap-credentials'"
          echo "5. Add SNAPCRAFT_STORE_CREDENTIALS secret"
          echo "6. Remove 'if: false' from this workflow"

  update-aur:
    name: Update AUR Package  
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Update AUR Package (Manual Process)
        run: |
          echo "AUR package update requires manual submission:"
          echo "1. Clone AUR repository: git clone ssh://aur@aur.archlinux.org/omne-cli.git"
          echo "2. Update PKGBUILD with new version and checksums"
          echo "3. Update .SRCINFO with makepkg --printsrcinfo > .SRCINFO"
          echo "4. Commit and push changes"
          echo ""
          echo "Version to update: ${{ github.event.release.tag_name || github.event.inputs.version }}"
          # TODO: Implement automated AUR update when proper action is available